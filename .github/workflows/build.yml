name: Android CI/CD Build System

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'বিল্ড টাইপ সিলেক্ট করুন (debug/release/bundle)'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
        - bundle

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOGLE_JSON_CONTENT: ${{ secrets.GOOGLE_SERVICES_JSON }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # এনডিকে এবং সিমেক সেটআপ (ফিক্সড পাথ)
      - name: Setup Android NDK & CMake
        run: |
          export SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER "ndk;25.1.8937393" "cmake;3.22.1"

      # গুগল সার্ভিসেস ফাইল সেটআপ (ফিক্সড সিক্রেট হ্যান্ডলিং)
      - name: Setup Google Services
        if: env.GOOGLE_JSON_CONTENT != ''
        run: |
          mkdir -p app
          echo "$GOOGLE_JSON_CONTENT" > app/google-services.json

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # বিল্ড লজিক (ইনপুট অনুযায়ী)
      - name: Run Build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          echo "Building: $BUILD_TYPE"
          
          if [ "$BUILD_TYPE" == "debug" ]; then
            ./gradlew :app:assembleDebug
          elif [ "$BUILD_TYPE" == "release" ]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:bundleRelease
          fi

      # আউটপুট ফাইল আপলোড
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/debug/
            app/build/outputs/apk/release/
            app/build/outputs/bundle/release/
