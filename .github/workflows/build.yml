name: Android CI/CD Build System

on:
  push:
    branches: [ "main" ]
  # ম্যানুয়ালি বিল্ড সিলেক্ট করার অপশন
  workflow_dispatch:
    inputs:
      build_type:
        description: 'বিল্ড টাইপ সিলেক্ট করুন (debug/release/bundle)'
        required: true
        default: 'debug'
        type: choice
        options:
        - debug
        - release
        - bundle

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # C++ বিল্ডের জন্য NDK এবং CMake
      - name: Setup Android NDK & CMake
        run: |
          echo "y" | sudo /usr/local/lib/android/sdk/tools/bin/sdkmanager --install "ndk;25.1.8937393" "cmake;3.22.1"

      # Google Services JSON জেনারেট (যদি সিক্রেটস সেট করা থাকে)
      - name: Setup Google Services
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # বিল্ড লজিক (ইনপুট অনুযায়ী কাজ করবে)
      - name: Run Build
        run: |
          if [ "${{ github.event.inputs.build_type || 'debug' }}" == "debug" ]; then
            ./gradlew :app:assembleDebug
          elif [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            ./gradlew :app:assembleRelease
          else
            ./gradlew :app:bundleRelease
          fi

      # আউটপুট ফাইল আপলোড করা
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
